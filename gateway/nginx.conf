server {
    listen 80;
    server_name localhost;   # 可改为你的域名，如 blog.example.com

    # 前端页面访问（默认指向前台）
    location / {
        proxy_pass http://blog-view:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 后台管理访问（路径前缀 /admin）
    location /admin/ {
        proxy_pass http://blog-cms:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 后端 API 访问（路径前缀 /api）
    location /blog-api/ {
        proxy_pass http://blog-api:8080/blog-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}